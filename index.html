<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NK Cubas</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Suas credenciais oficiais do projeto NK Cubas
        const firebaseConfig = {
            apiKey: "AIzaSyDZAotfkbiPDmMi0nFKS0wvV9x_3QDZE3E",
            authDomain: "nk-cubas.firebaseapp.com",
            projectId: "nk-cubas",
            storageBucket: "nk-cubas.firebasestorage.app",
            messagingSenderId: "1097535658296",
            appId: "1:1097535658296:web:3ae4e02b4b73e3343c89cd"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-login-custom">
    <div class="container-login">
        <img src="foto-cuba/logo.jpeg" alt="Logo NK Cubas" style="width: 200px; margin-bottom: 10px; border-radius: 10px;">
        <h1 class="titulo-bemvindo">Bem Vindo</h1>

        <div class="caixa-login" id="caixa-login">
            <div class="area-abas">
                <button class="btn-aba ativo" id="aba-cliente" onclick="mudarModo('cliente')">Cliente</button>
                <button class="btn-aba" id="aba-vendedor" onclick="mudarModo('vendedor')">Vendedor</button>
            </div>

            <div class="grupo-input">
                <label id="label-usuario">CNPJ do Cliente</label>
                <input type="text" id="usuario" placeholder="Digite seu CNPJ (apenas números)" autocomplete="username">
            </div>

            <div class="grupo-input">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
            </div>

            <button class="btn-login" onclick="fazerLogin()" style="width: 100%; padding: 12px; background-color: #000; color: #ffd700; border: 1px solid #ffd700; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px;">Entrar</button>
        </div>
    </div>

    <script>
        let modoAtual = 'cliente';

        function mudarModo(modo) {
            modoAtual = modo;
            const caixa = document.getElementById('caixa-login');
            const abaCliente = document.getElementById('aba-cliente');
            const abaVendedor = document.getElementById('aba-vendedor');
            const labelUsuario = document.getElementById('label-usuario');
            const inputUsuario = document.getElementById('usuario');

            if (modo === 'vendedor') {
                caixa.classList.add('modo-vendedor');
                abaVendedor.classList.add('ativo');
                abaCliente.classList.remove('ativo');
                labelUsuario.innerText = 'CPF do Vendedor';
                inputUsuario.placeholder = 'Digite seu CPF (apenas números)';
            } else {
                caixa.classList.remove('modo-vendedor');
                abaCliente.classList.add('ativo');
                abaVendedor.classList.remove('ativo');
                labelUsuario.innerText = 'CNPJ do Cliente';
                inputUsuario.placeholder = 'Digite seu CNPJ (apenas números)';
            }
        }

        function fazerLogin() {
            const usuario = document.getElementById('usuario').value.replace(/\D/g, '');
            const senha = document.getElementById('senha').value;

            if (!usuario || !senha) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            if (modoAtual === 'vendedor') {
                // Busca o vendedor na Nuvem do Firebase pelo documento (CPF)
                db.collection('vendedores').doc(usuario).get().then((doc) => {
                    if (doc.exists) {
                        const dadosVendedor = doc.data();
                        if (senha === dadosVendedor.senha) {
                            localStorage.setItem('perfilLogado', 'vendedor');
                            localStorage.setItem('nomeVendedorLogado', dadosVendedor.nome);
                            localStorage.setItem('documentoLogado', usuario);
                            window.location.href = 'catalogo.html';
                        } else {
                            alert("Senha do vendedor incorreta!");
                        }
                    } else {
                        alert("Vendedor não encontrado ou dados incorretos!");
                    }
                }).catch((error) => {
                    alert("Erro ao conectar ao servidor: " + error);
                });
            } else {
                // Busca o cliente na Nuvem do Firebase pelo CNPJ
                db.collection('clientes').doc(usuario).get().then((doc) => {
                    if (doc.exists) {
                        const dadosCliente = doc.data();
                        if (senha === dadosCliente.senha) {
                            localStorage.setItem('perfilLogado', 'cliente');
                            localStorage.setItem('cnpjClienteAtivo', usuario); 
                            window.location.href = 'catalogo.html';
                        } else { 
                            alert("Senha de cliente incorreta!"); 
                        }
                    } else {
                        alert("Este CNPJ não possui cadastro ativo na Nuvem. Solicite o cadastro ao seu vendedor!");
                    }
                }).catch((error) => {
                    alert("Erro ao conectar ao servidor: " + error);
                });
            }
        }
    </script>
</body>
</html>
