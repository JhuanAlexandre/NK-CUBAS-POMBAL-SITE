<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas Master - NK Cubas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZAotfkbiPDmMi0nFKS0wvV9x_3QDZE3E",
            authDomain: "nk-cubas.firebaseapp.com",
            projectId: "nk-cubas",
            storageBucket: "nk-cubas.firebasestorage.app",
            messagingSenderId: "1097535658296",
            appId: "1:1097535658296:web:3ae4e02b4b73e3343c89cd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #0d0d0d; color: white; padding: 20px; }
        .topo-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #ffd700; padding-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        .btn-acao { padding: 12px 22px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; }
        .secao-data { background: #161616; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .secao-data h3 { margin-top: 0; color: #ffd700; border-bottom: 1px dashed #ffd700; padding-bottom: 8px; margin-bottom: 15px; }
        .card-venda { background: #222; border-left: 5px solid #ffd700; margin-bottom: 12px; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .info-venda span { color: #b3b3b3; font-size: 13px; line-height: 1.6; }
        .menu-secao h3 { color: #ffd700; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="topo-painel">
        <div>
            <h1 id="titulo-painel" style="margin: 0; font-size: 26px; color: #ffd700;">Painel de Vendas - Mês Atual</h1>
            <p style="margin: 5px 0 0 0; color: #888; font-weight: bold;">NK Cubas Distribuidora S/A</p>
        </div>
        <div style="display:flex; gap:12px; flex-wrap: wrap;">
            <button id="btn-alternar-modo" class="btn-acao" style="background: #ffd700; color: black;" onclick="alternarModoPainel()">👁️ Ver Histórico Antigo</button>
            <button class="btn-acao" style="background: #444; color: white;" onclick="window.location.href='catalogo.html'">⬅️ Voltar ao Catálogo</button>
        </div>
    </div>

    <!-- SEÇÃO DE DESEMPENHO (Gráfico e Cards) -->
    <div id="secao-desempenho" class="menu-secao" style="margin-bottom: 30px; padding: 20px; background: #141414; border-radius: 12px;">
        <h3>📊 Desempenho da Empresa (Mensal)</h3>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px;">
            <div style="flex: 1; min-width: 250px; background: #1e1e1e; padding: 15px; border-radius: 8px; text-align: center;">
                <p>Faturamento Total</p>
                <h2 id="dash-faturamento" style="color: #20bf6b;">R$ 0,00</h2>
            </div>
            <div style="flex: 1; min-width: 250px; background: #1e1e1e; padding: 15px; border-radius: 8px; text-align: center;">
                <p>Total de Itens Vendidos</p>
                <h2 id="dash-itens" style="color: #3867d6;">0 un</h2>
            </div>
        </div>
        <div style="max-width: 600px; margin: 20px auto;">
            <canvas id="graficoVendas"></canvas>
        </div>
    </div>

    <!-- LISTAGEM REALTIME DAS VENDAS -->
    <div id="container-vendas"></div>

    <!-- SEÇÃO DE GESTÃO DE CLIENTES -->
    <div id="secao-clientes-master" class="menu-secao" style="margin-bottom: 30px; padding: 20px; background: #141414; border-radius: 12px;">
        <h3>👥 Gestão de Clientes e Vendedores Vinculados</h3>
        <div id="lista-clientes-gestao" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <!-- Injetado via JS -->
        </div>
    </div>

<script>
let exibindoHistoricoGeral = false;
let historicoVendasRealtime = [];
let listaClientesRealtime = [];
let meuGrafico = null;

window.onload = function() {
    let perfil = localStorage.getItem('perfilLogado');
    let docLogado = localStorage.getItem('documentoLogado');
    if (perfil !== 'master' && docLogado !== '61941386000120') {
        alert("Acesso restrito ao Painel Master Administrativo!");
        window.location.href = 'catalogo.html';
        return;
    }
    
    // 1. Escuta a coleção de vendas do Firebase em tempo real
    db.collection('vendas').onSnapshot((snapshot) => {
        historicoVendasRealtime = [];
        snapshot.forEach((doc) => {
            historicoVendasRealtime.push({
                firestoreId: doc.id,
                ...doc.data()
            });
        });
        
        historicoVendasRealtime.sort((a, b) => {
            let dtA = a.dataHora || "";
            let dtB = b.dataHora || "";
            return dtB.localeCompare(dtA);
        });
        
        renderizarPainelVendas();
    }, (error) => {
        console.error("Erro de sincronização em tempo real: ", error);
    });

    // 2. Escuta a coleção de clientes para a listagem Master
    db.collection('clientes').onSnapshot((snapshot) => {
        listaClientesRealtime = [];
        snapshot.forEach((doc) => {
            listaClientesRealtime.push({
                firestoreId: doc.id,
                ...doc.data()
            });
        });
        renderizarGestaoClientes();
    });
};

function alternarModoPainel() {
    exibindoHistoricoGeral = !exibindoHistoricoGeral;
    let btn = document.getElementById('btn-alternar-modo');
    let titulo = document.getElementById('titulo-painel');
    
    if(exibindoHistoricoGeral) {
        btn.innerText = "👁️ Ver Vendas do Mês";
        btn.style.backgroundColor = "#2b5797";
        btn.style.color = "white";
        titulo.innerText = "Histórico Geral Arquivado (Vendas Antigas)";
    } else {
        btn.innerText = "👁️ Ver Histórico Antigo";
        btn.style.backgroundColor = "#ffd700";
        btn.style.color = "black";
        titulo.innerText = "Painel de Vendas - Mês Atual";
    }
    renderizarPainelVendas();
}

function renderizarPainelVendas() {
    let container = document.getElementById('container-vendas');
    container.innerHTML = '';
    
    let hoje = new Date();
    let mesAtual = hoje.getMonth() + 1;
    let anoAtual = hoje.getFullYear();
    
    let filtradas = historicoVendasRealtime.filter(venda => {
        if(!venda.data) return false;
        let partes = venda.data.split('/');
        let mesVenda = parseInt(partes[1]);
        let anoVenda = parseInt(partes[2]);
        
        let pertenceAoMesAtual = (mesVenda === mesAtual && anoVenda === anoAtual);
        return exibindoHistoricoGeral ? !pertenceAoMesAtual : pertenceAoMesAtual;
    });

    // Cálculos do Dashboard e Gráfico
    let totalFaturamento = 0;
    let totalItens = 0;
    let faturamentoPorDia = {};

    filtradas.forEach(venda => {
        totalFaturamento += venda.valorTotal;
        if(venda.itens) {
            venda.itens.forEach(i => totalItens += i.qtd);
        }
        // Agrupa para o gráfico
        faturamentoPorDia[venda.data] = (faturamentoPorDia[venda.data] || 0) + venda.valorTotal;
    });

    // Atualiza os cards de texto do topo
    document.getElementById('dash-faturamento').innerText = `R$ ${totalFaturamento.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
    document.getElementById('dash-itens').innerText = `${totalItens} un`;

    // Renderiza/Atualiza o gráfico do Chart.js
    atualizarGraficoVendas(faturamentoPorDia);

    if(filtradas.length === 0) {
        container.innerHTML = `<p style="text-align:center; padding:40px; color:#888; font-weight:bold;">Nenhum registro de venda encontrado para esta listagem.</p>`;
        return;
    }

    let agrupadoPorData = {};
    filtradas.forEach(venda => {
        if(!agrupadoPorData[venda.data]) { agrupadoPorData[venda.data] = []; }
        agrupadoPorData[venda.data].push(venda);
    });

    for(let data in agrupadoPorData) {
        let divData = document.createElement('div');
        divData.className = 'secao-data';
        divData.innerHTML = `<h3>📅 Vendas Realizadas em: ${data}</h3>`;
        
        agrupadoPorData[data].forEach(venda => {
            let descItens = venda.itens ? venda.itens.map(i => `${i.nome} (${i.qtd}x)`).join(', ') : 'Nenhum item';
            
            let card = document.createElement('div');
            card.className = 'card-venda';
            card.innerHTML = `
                <div class="info-venda">
                    <strong style="font-size:17px; color:#fff;">Pedido #${venda.id} - ${venda.cliente}</strong> 
                    <span style="background:#ffd700; color:black; font-weight:bold; font-size:11px; padding:2px 6px; border-radius:3px; margin-left:6px;">${venda.metodoPagamento}</span><br>
                    <span style="display:block; margin-top:5px;"><b>Responsável:</b> ${venda.vendedor} | <b>Cidade:</b> ${venda.cidade} | <b>Itens:</b> ${descItens}</span>
                    <span style="font-size:12px; color:#aaa; display:block; margin-top:3px;">Expositor: <b>${venda.temExpositor || 'NÃO'}</b> | Logística: <b>${venda.entreguePor || 'Empresa'}</b></span>
                    ${venda.dataModificacao ? `<span style="color:#ff6b6b; font-weight:bold; font-size:11px; display:block; margin-top:3px;">⚠️ Última Modificação: ${venda.dataModificacao}</span>` : ''}
                </div>
                <div style="text-align:right; display:flex; flex-direction:column; gap:8px; min-width:150px;">
                    <span style="color:#20bf6b; font-weight:bold; font-size:20px;">R$ ${venda.valorTotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span>
                    <div>
                        <button onclick="regerarPDFVenda('${venda.firestoreId}')" style="background:#e74c3c; color:white; border:none; padding:6px 10px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; margin-right:5px;">📄 Ver PDF</button>
                        <button onclick="excluirVendaMaster('${venda.firestoreId}')" style="background:#111; color:#ff4d4d; border:1px solid #ff4d4d; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">❌ Excluir</button>
                    </div>
                </div>
            `;
            divData.appendChild(card);
        });
        container.appendChild(divData);
    }
}

function atualizarGraficoVendas(dadosFaturamento) {
    let ctx = document.getElementById('graficoVendas').getContext('2d');
    
    // Ordena as datas cronologicamente para exibição linear no gráfico
    let datasOrdenadas = Object.keys(dadosFaturamento).sort((a, b) => {
        let pA = a.split('/'), pB = b.split('/');
        return new Date(pA[2], pA[1]-1, pA[0]) - new Date(pB[2], pB[1]-1, pB[0]);
    });
    
    let valores = datasOrdenadas.map(data => dadosFaturamento[data]);

    if(meuGrafico) { meuGrafico.destroy(); }

    meuGrafico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: datasOrdenadas,
            datasets: [{
                label: 'Faturamento Diário (R$)',
                data: valores,
                backgroundColor: '#ffd700',
                borderColor: '#b8860b',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#fff' } },
                x: { ticks: { color: '#fff' } }
            },
            plugins: {
                legend: { labels: { color: '#fff' } }
            }
        }
    });
}

function renderizarGestaoClientes() {
    let container = document.getElementById('lista-clientes-gestao');
    if(!container) return;
    container.innerHTML = '';

    if(listaClientesRealtime.length === 0) {
        container.innerHTML = '<p style="color:gray; padding:10px;">Nenhum cliente sincronizado na nuvem.</p>';
        return;
    }

    listaClientesRealtime.forEach(cliente => {
        container.innerHTML += `
            <div style="background:#222; padding:15px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #333; flex-wrap:wrap; gap:10px;">
                <div>
                    <strong style="color:#fff; font-size:16px;">${cliente.nome}</strong><br>
                    <span style="font-size:13px; color:#aaa;">CNPJ: ${cliente.cnpj} | Cidade: ${cliente.cidade}-${cliente.estado}</span><br>
                    <span style="font-size:12px; color:#888;">Vendedor Vinculado: <b>${cliente.vendedor || 'Nenhum'}</b></span>
                </div>
                <div>
                    <button onclick="alternarRestricaoCredito('${cliente.cnpj}', ${cliente.restrito})" style="background:${cliente.restrito ? '#d9534f' : '#5cb85c'}; color:white; border:none; padding:8px 14px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:13px;">
                        ${cliente.restrito ? '❌ RESTRITO (Boleto Bloqueado)' : '✅ LIBERADO (Boleto OK)'}
                    </button>
                </div>
            </div>
        `;
    });
}

function alternarRestricaoCredito(cnpj, statusAtual) {
    let proximoStatus = !statusAtual;
    let msg = proximoStatus ? "Deseja BLOQUEAR as vendas via Boleto para este CNPJ?" : "Deseja LIBERAR as vendas via Boleto para este CNPJ?";
    
    if(confirm(msg)) {
        db.collection('clientes').doc(cnpj).update({
            restrito: proximoStatus
        }).then(() => {
            alert("Status de restrição financeira do cliente modificado com sucesso!");
        }).catch((err) => {
            alert("Erro ao alterar privilégios do cliente: " + err);
        });
    }
}

function excluirVendaMaster(firestoreId) {
    if(confirm("Deseja apagar permanentemente este registro de venda do sistema? Esta ação é irreversível da Nuvem.")) {
        db.collection('vendas').doc(firestoreId).delete().then(() => {
            alert("Venda excluída da nuvem com sucesso!");
        }).catch((err) => {
            alert("Erro ao excluir documento: " + err);
        });
    }
}

function regerarPDFVenda(firestoreId) {
    let venda = historicoVendasRealtime.find(h => h.firestoreId === firestoreId);
    if(!venda) return;
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(9);
    doc.text("NK CUBAS POMBAL LTDA - (11) 99994-8702", 14, 27);
    doc.text("RODOVIA BR 110 KM 09, N° S/N, LOTE 03 QUAD - Ribeira do Pombal, BA", 14, 32);
    doc.text("CNPJ: 61.941.386/0001-20", 14, 37);

    doc.rect(14, 43, 180, 32); 
    doc.setFont("helvetica", "bold");
    doc.text(`Número do pedido: ${venda.id}`, 16, 49);
    doc.text(`Data: ${venda.data}`, 140, 49);
    
    doc.text("CLIENTE:", 16, 57);
    doc.setFont("helvetica", "normal");
    doc.text(venda.cliente, 35, 57);
    doc.text(`CNPJ: ${venda.cnpj || 'Não cadastrado'}`, 140, 57);
    doc.text(`Localidade: ${venda.cidade || 'Não informada'} / ${venda.estado || 'BA'}`, 16, 63);
    
    doc.setFont("helvetica", "bold");
    doc.text(`VENDEDOR: ${venda.vendedor}`, 16, 70);
    doc.text(`Forma: ${venda.metodoPagamento} | Expositor: ${venda.temExpositor || 'NÃO'}`, 95, 70);

    let tabelaCorpo = [];
    let somaQtd = 0;
    venda.itens.forEach(item => {
        let totalLinha = item.preco * item.qtd;
        somaQtd += item.qtd;
        tabelaCorpo.push([item.nome, item.codigo || "000000", "UN", item.qtd.toString(), "R$ " + item.preco.toLocaleString('pt-BR', {minimumFractionDigits:2}), "R$ " + totalLinha.toLocaleString('pt-BR', {minimumFractionDigits:2})]);
    });

    doc.autoTable({
        startY: 82,
        head: [['Descrição do produto/serviço', 'Código', 'Un.', 'Qtd.', 'Valor unitário', 'Valor total']],
        body: tabelaCorpo,
        theme: 'grid',
        headStyles: { fillColor: [30, 30, 30], textColor: [255, 215, 0] }
    });

    let yF = doc.lastAutoTable.finalY + 10;
    doc.setFont("helvetica", "normal");
    doc.text(`Soma das Qtdes: ${somaQtd}`, 14, yF);
    doc.setFont("helvetica", "bold");
    doc.text(`TOTAL FINAL: R$ ${venda.valorTotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}`, 130, yF + 6);

    doc.save(`Pedido_${venda.id}_Reemissao.pdf`);
}
</script>
</body>
</html>
